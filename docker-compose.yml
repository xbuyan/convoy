services:
  postgres:
    image: postgres:15-alpine
    container_name: convoy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: convoy
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: convoy
    ports:
      # host:container — 5433 on your machine, since 5432 is already
      # taken by another project's Postgres container.
      - "5433:5432"
    volumes:
      - convoy_pg_data:/var/lib/postgresql/data

volumes:
  convoy_pg_data:
